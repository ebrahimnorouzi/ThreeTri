name: Telegram bot

# Interactive @ThreeTriBot. Polls Telegram every ~5 min and replies to commands
# (/help, /standings, /coach, /ask, …). No server needed — runs on free Actions
# minutes (public repo). Replies arrive within a few minutes of a command.
#
# First-time: run once with action=setup to register the / command menu.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (the minimum GitHub allows)
  workflow_dispatch:
    inputs:
      action:
        description: "poll or setup (setup registers the / command menu)"
        default: "poll"

permissions:
  contents: read

concurrency:
  group: "telegram-bot"
  cancel-in-progress: true

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests anthropic
      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Optional — power /ask and /coach AI (same backend as the pipeline):
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          COACH_BACKEND: ${{ vars.COACH_BACKEND }}
        run: |
          if [ "${{ github.event.inputs.action }}" = "setup" ]; then
            python pipeline/bot.py --setup
          else
            python pipeline/bot.py
          fi
