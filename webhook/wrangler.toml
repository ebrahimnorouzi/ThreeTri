# Cloudflare Worker config for the ThreeTri Telegram bot (instant webhook replies).
# Deploy:  cd webhook && wrangler deploy   (see README.md)
name = "threetri-bot"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
SITE_BASE = "https://ebrahimnorouzi.github.io/ThreeTri"
# COACH_MODEL = "claude-haiku-4-5"   # optional override
# HF_MODEL = "Qwen/Qwen2.5-7B-Instruct:cheapest"

# Secrets are NOT set here — set them with `wrangler secret put <NAME>`:
#   BOT_TOKEN          (required)  Telegram bot token
#   WEBHOOK_SECRET     (recommended) random string; verifies requests are from Telegram
#   ANTHROPIC_API_KEY  (optional)  powers /ask and /coach with Claude
#   HF_TOKEN           (optional)  powers /ask and /coach with Hugging Face (free-ish)
